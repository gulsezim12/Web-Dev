<article class="card">
  <div class="img-wrap">
    <img class="main-img" [src]="currentImage" [alt]="product.name" />
  </div>

  <div class="thumbs" *ngIf="product.images?.length">
    <button
      class="thumb"
      *ngFor="let img of product.images; let i = index"
      (click)="selectImage(i)"
      [class.active]="i === currentIndex"
      type="button"
    >
      <img [src]="img" [alt]="product.name + ' ' + (i + 1)" />
    </button>
  </div>

  <h3 class="title">{{ product.name }}</h3>
  <p class="desc">{{ product.description }}</p>

  <div class="price">{{ product.price | number }} ₸</div>

  <div class="rating">
    <span class="stars">
      <span class="star" *ngFor="let s of stars">★</span>
      <span class="star empty" *ngFor="let e of emptyStars">★</span>
    </span>
    <span class="rating-num">{{ product.rating }}</span>
  </div>

  <a class="kaspi-link" [href]="product.link" target="_blank" rel="noopener">
    Открыть на Kaspi
  </a>

  <div class="actions">
    <a class="btn" [href]="whatsappShareUrl" target="_blank" rel="noopener">WhatsApp</a>
    <a class="btn" [href]="telegramShareUrl" target="_blank" rel="noopener">Telegram</a>
  </div>
</article>
