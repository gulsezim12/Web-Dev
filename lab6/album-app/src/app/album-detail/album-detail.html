<h2>Album Detail</h2>

<p *ngIf="loading">Loading...</p>

<div *ngIf="!loading && album">
  <p><b>ID:</b> {{ album.id }}</p>
  <p><b>UserID:</b> {{ album.userId }}</p>

  <label><b>Title:</b></label><br>
  <input [(ngModel)]="titleEdit" />

  <div style="margin-top: 12px;">
    <button (click)="save()">Save</button>

    <a [routerLink]="['/albums', album.id, 'photos']" style="margin-left: 12px;">
      View Photos
    </a>

    <a routerLink="/albums" style="margin-left: 12px;">
      Back
    </a>
  </div>
</div>
